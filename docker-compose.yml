version: '3.8'

services:
  # Hono (Apollo API Server)
  api-server:
    image: denoland/deno:latest
    container_name: api
    restart: unless-stopped
    working_dir: /app
    ports:
      - "4000:4000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=EduTech2026!
      - PG_URI=postgres://edu_admin:EduTechDB2026!@postgres:5432/edutech_lrs
      - REDIS_URI=redis://redis:6379
    volumes:
      - ./src:/app/src
    command: run --allow-net --allow-env --allow-read src/main.ts
    deploy:
      resources:
        limits:
          memory: 2048M

  # Neo4j (Knowledge Graph)
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/EduTech2026!
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=1536m
      - NEO4J_server_memory_pagecache_size=1G
    deploy:
      resources:
        limits:
          memory: 3584M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  # PostgreSQL (xAPI LRS & Meta DB)
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_USER=edu_admin
      - POSTGRES_PASSWORD=EduTechDB2026!
      - POSTGRES_DB=edutech_lrs
    shm_size: 1gb
    deploy:
      resources:
        limits:
          memory: 4096M
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 4. Redis (LTI Session)
  redis:
    image: redis:latest
    container_name: redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M

  # 5. Meilisearch (Search Engine)
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    environment:
      - MEILI_MASTER_KEY=SuperSecretKeyForSearch2026!
      - MEILI_MAX_MEMORY=1500MB
    deploy:
      resources:
        limits:
          memory: 1536M
    volumes:
      - meili_data:/meili_data

volumes:
  neo4j_data:
  pg_data:
  redis_data:
  meili_data: