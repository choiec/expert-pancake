[package]
name = "rust"
version = "0.1.0"
edition = "2024"

[workspace]
members = [
	"crates/app_server",
	"crates/core_infra",
	"crates/core_shared",
	"crates/mod_memory",
]
resolver = "3"

[workspace.dependencies]
axum = { version = "0.8.1", features = ["json", "macros"] }
http = "1.3.1"
meilisearch-sdk = "0.28.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
sha2 = "0.10.8"
surrealdb = { version = "2.3.3", default-features = false, features = ["protocol-ws", "rustls"] }
thiserror = "2.0.12"
tokio = { version = "1.44.2", features = ["macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tower = { version = "0.5.2", features = ["timeout", "util"] }
tower-http = { version = "0.6.2", features = ["request-id", "trace"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1.16.0", features = ["serde", "v4", "v5"] }
validator = { version = "0.20.0", features = ["derive"] }

[dev-dependencies]
app_server = { path = "crates/app_server" }
axum = { workspace = true }
core_infra = { path = "crates/core_infra" }
core_shared = { path = "crates/core_shared" }
mod_memory = { path = "crates/mod_memory" }
serde_json = { workspace = true }
time = { version = "0.3.44", features = ["serde"] }
tokio = { workspace = true }
tower = { workspace = true }
uuid = { workspace = true }

[[test]]
name = "health_readiness_contract"
path = "tests/contract/health_readiness_contract.rs"

[[test]]
name = "normalized_json_hash"
path = "tests/unit/normalized_json_hash.rs"

[[test]]
name = "normalization_edges"
path = "tests/unit/normalization_edges.rs"

[[test]]
name = "register_source_replay_hashing"
path = "tests/integration/register_source_replay_hashing.rs"

[[test]]
name = "surreal_source_store_contract"
path = "tests/contract/surreal_source_store_contract.rs"

[[test]]
name = "surreal_memory_store_contract"
path = "tests/contract/surreal_memory_store_contract.rs"

[[test]]
name = "surreal_retention_contract"
path = "tests/contract/surreal_retention_contract.rs"

[[test]]
name = "indexing_outbox_mapping_contract"
path = "tests/contract/indexing_outbox_mapping_contract.rs"

[dependencies]
