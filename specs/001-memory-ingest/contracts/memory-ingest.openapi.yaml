openapi: 3.1.0
info:
  title: Memory Ingest API
  version: 0.1.0
  summary: Implement-ready contract for the first memory-ingest vertical slice.
servers:
  - url: http://127.0.0.1:3000
paths:
  /sources/register:
    post:
      summary: Register a source document and derive memory items.
      description: Canonical requests are validated directly. Open Badges AchievementCredential-style and CLR credential-style requests must pass repository-pinned JSON Schema validation for the supported envelope profiles in this slice and must map deterministically into canonical title and external_id while preserving the accepted UTF-8 request body as authoritative canonical content. Accepted standard payloads are exposed as `document_type = json` with one derived `json_document` memory item.
      operationId: registerSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CanonicalRegisterRequest'
                - $ref: '#/components/schemas/OpenBadgesRegisterRequest'
                - $ref: '#/components/schemas/ClrRegisterRequest'
      responses:
        '200':
          description: Idempotent replay of an existing authoritative source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSourceResponse'
        '201':
          description: New source registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSourceResponse'
        '400':
          description: Invalid input, invalid supported-standard payload, or unsupported canonical mapping.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '408':
          description: Normalization timeout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate external id with conflicting canonical payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Authoritative storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sources/{source-id}:
    get:
      summary: Retrieve a source and all associated memory items.
      operationId: getSource
      parameters:
        - name: source-id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Source found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'
        '404':
          description: Source not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Authoritative storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /memory-items/{urn}:
    get:
      summary: Retrieve a memory item by URN.
      operationId: getMemoryItem
      parameters:
        - name: urn
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory item found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryItemResponse'
        '404':
          description: Memory item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Authoritative storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /search/memory-items:
    get:
      summary: Search memory-item projections.
      description: Returns Meilisearch projection hits only. Authoritative content remains available through GET /memory-items/{urn} and GET /sources/{source-id}.
      operationId: searchMemoryItems
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: source-id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: document-type
          in: query
          required: false
          schema:
            type: string
            enum: [text, markdown, json]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '503':
          description: Search unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      summary: Local-only liveness probe.
      operationId: getHealth
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      summary: Dependency-aware readiness probe for the write path.
      operationId: getReady
      responses:
        '200':
          description: Authoritative write path is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Authoritative write path is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
components:
  schemas:
    CanonicalRegisterRequest:
      type: object
      required:
        - title
        - external-id
        - document-type
        - content
      properties:
        title:
          type: string
          minLength: 1
        summary:
          type: string
        external-id:
          type: string
          minLength: 1
        document-type:
          type: string
          enum: [text, markdown]
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
    OpenBadgesRegisterRequest:
      type: object
      required:
        - '@context'
        - type
        - id
        - name
      properties:
        '@context':
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        type:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        id:
          type: string
        name:
          type: string
      additionalProperties: true
      description: Boundary DTO validated against the repository-pinned Open Badges AchievementCredential envelope schema for this slice. If the payload passes envelope validation but cannot be mapped deterministically into canonical title and external_id, the request fails with 400. Successful requests are persisted with `document_type = json` and one `json_document` memory item.
    ClrRegisterRequest:
      type: object
      required:
        - '@context'
        - type
        - id
        - name
      properties:
        '@context':
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        type:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        id:
          type: string
        name:
          type: string
        issuer:
          type: object
          additionalProperties: true
      additionalProperties: true
      description: Boundary DTO validated against the repository-pinned CLR credential envelope schema for this slice. If the payload passes envelope validation but cannot be mapped deterministically into canonical title and external_id, the request fails with 400. Successful requests are persisted with `document_type = json` and one `json_document` memory item.
    RegisterSourceResponse:
      type: object
      required:
        - source_id
        - external_id
        - document_type
        - memory_items
        - indexing_status
      properties:
        source_id:
          type: string
          format: uuid
        external_id:
          type: string
        document_type:
          type: string
          enum: [text, markdown, json]
        indexing_status:
          $ref: '#/components/schemas/IndexingStatus'
        memory_items:
          type: array
          items:
            $ref: '#/components/schemas/MemoryItemSummary'
    MemoryItemSummary:
      type: object
      required:
        - urn
        - sequence
        - unit_type
      properties:
        urn:
          type: string
        sequence:
          type: integer
          minimum: 0
        unit_type:
          $ref: '#/components/schemas/MemoryUnitType'
    SourceResponse:
      type: object
      required:
        - source_id
        - external_id
        - title
        - document_type
        - created_at
        - indexing_status
        - memory_items
      properties:
        source_id:
          type: string
          format: uuid
        external_id:
          type: string
        title:
          type: string
        summary:
          type: string
        document_type:
          type: string
          enum: [text, markdown, json]
        created_at:
          type: string
          format: date-time
        indexing_status:
          $ref: '#/components/schemas/IndexingStatus'
        memory_items:
          type: array
          items:
            $ref: '#/components/schemas/MemoryItemResponse'
    MemoryItemResponse:
      type: object
      required:
        - urn
        - source_id
        - sequence
        - content
        - item_metadata
        - created_at
      properties:
        urn:
          type: string
        source_id:
          type: string
          format: uuid
        sequence:
          type: integer
          minimum: 0
        content:
          type: string
        item_metadata:
          type: object
          required:
            - unit_type
            - start_offset
            - end_offset
            - version
          properties:
            unit_type:
              $ref: '#/components/schemas/MemoryUnitType'
            start_offset:
              type: integer
              minimum: 0
              description: Inclusive UTF-8 byte offset into authoritative canonical content.
            end_offset:
              type: integer
              minimum: 0
              description: Exclusive UTF-8 byte offset into authoritative canonical content.
            version:
              type: string
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        source_metadata:
          type: object
          additionalProperties: true
    SearchResponse:
      type: object
      description: Search projection response from Meilisearch. Items are projection hits, not authoritative retrieval documents.
      required:
        - total
        - limit
        - offset
        - items
      properties:
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchHit'
    SearchHit:
      type: object
      description: Search projection hit containing preview data only.
      required:
        - urn
        - source_id
        - sequence
        - document_type
        - content_preview
      properties:
        urn:
          type: string
        source_id:
          type: string
          format: uuid
        sequence:
          type: integer
          minimum: 0
        document_type:
          type: string
          enum: [text, markdown, json]
        content_preview:
          type: string
        score:
          type: number
          format: float
    IndexingStatus:
      type: string
      description: Public indexing progress vocabulary only. Internal outbox job states are not exposed.
      enum: [queued, indexed, deferred]
    MemoryUnitType:
      type: string
      enum: [paragraph, section, json_document, metadata_placeholder]
    HealthResponse:
      type: object
      required:
        - status
        - components
      properties:
        status:
          type: string
          enum: [ready]
        components:
          type: object
          required:
            - service
          properties:
            service:
              $ref: '#/components/schemas/ComponentStatus'
    ReadinessResponse:
      type: object
      required:
        - status
        - components
      properties:
        status:
          type: string
          enum: [ready, degraded, down]
        components:
          type: object
          required:
            - service
            - database
            - search
          properties:
            service:
              $ref: '#/components/schemas/ComponentStatus'
            database:
              $ref: '#/components/schemas/ComponentStatus'
            search:
              $ref: '#/components/schemas/ComponentStatus'
    ComponentStatus:
      type: string
      enum: [ready, degraded, down]
    ErrorResponse:
      type: object
      required:
        - error_code
        - message
        - timestamp
        - request_id
      properties:
        error_code:
          type: string
        message:
          type: string
        details:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string