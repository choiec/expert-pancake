openapi: 3.1.0
info:
  title: Schema-Native Credential Registry API
  version: 0.3.0
  summary: Schema-native Open Badges and CLR credential ingest contract.
  description: >-
    Public contract for authoritative registration and retrieval of supported
    standard credential documents without service-owned wrapper fields.
servers:
  - url: http://127.0.0.1:3000
paths:
  /credentials/register:
    post:
      summary: Register a supported standard credential.
      operationId: registerCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/OpenBadgesCredential'
                - $ref: '#/components/schemas/ClrCredential'
      responses:
        '200':
          description: Idempotent replay of an existing authoritative credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthoritativeCredential'
        '201':
          description: New credential registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthoritativeCredential'
        '400':
          description: Invalid payload or unsupported top-level fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '408':
          description: Validation timeout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Credential id already exists with a semantically different payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Authoritative storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /credentials/{credential-id}:
    get:
      summary: Retrieve an authoritative credential by official id.
      operationId: getCredential
      parameters:
        - name: credential-id
          in: path
          required: true
          description: URL-encoded standard credential id.
          schema:
            type: string
      responses:
        '200':
          description: Credential found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthoritativeCredential'
        '404':
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Authoritative storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /credentials/search:
    get:
      summary: Search credential projections.
      operationId: searchCredentials
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: family
          in: query
          required: false
          schema:
            type: string
            enum: [open_badges_v3, clr_v2]
        - name: issuer-id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialSearchResponse'
        '503':
          description: Search unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      summary: Local-only liveness probe.
      operationId: getHealth
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      summary: Dependency-aware readiness probe for the authoritative write path.
      operationId: getReady
      responses:
        '200':
          description: Authoritative write path is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Authoritative write path is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
components:
  schemas:
    AuthoritativeCredential:
      oneOf:
        - $ref: '#/components/schemas/OpenBadgesCredential'
        - $ref: '#/components/schemas/ClrCredential'
    StandardCredentialEnvelope:
      type: object
      additionalProperties: false
      properties:
        '@context':
          oneOf:
            - type: string
            - type: array
              items: {}
        awardedDate:
          type: string
        credentialSchema:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        credentialStatus:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        credentialSubject:
          type: object
        description:
          oneOf:
            - type: string
            - type: object
        endorsement:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        endorsementJwt:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        evidence:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        id:
          type: string
        image:
          oneOf:
            - type: string
            - type: object
        issuer:
          oneOf:
            - type: string
            - type: object
        name:
          oneOf:
            - type: string
            - type: object
        partial:
          type: boolean
        proof:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        refreshService:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        termsOfUse:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        type:
          oneOf:
            - type: string
            - type: array
              items: {}
        validFrom:
          type: string
        validUntil:
          type: string
    OpenBadgesCredential:
      allOf:
        - $ref: '#/components/schemas/StandardCredentialEnvelope'
        - type: object
          required:
            - '@context'
            - type
            - id
            - issuer
            - credentialSubject
            - proof
            - validFrom
    ClrCredential:
      allOf:
        - $ref: '#/components/schemas/StandardCredentialEnvelope'
        - type: object
          required:
            - '@context'
            - type
            - id
            - issuer
            - name
            - credentialSubject
            - proof
            - validFrom
    CredentialSearchResponse:
      type: object
      required:
        - items
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CredentialSearchHit'
        limit:
          type: integer
        offset:
          type: integer
    CredentialSearchHit:
      type: object
      required:
        - credential
      properties:
        credential:
          type: object
          required:
            - id
          properties:
            id:
              type: string
            type:
              oneOf:
                - type: string
                - type: array
                  items: {}
            name:
              oneOf:
                - type: string
                - type: object
            issuer:
              oneOf:
                - type: string
                - type: object
            validFrom:
              type: string
        family:
          type: string
          enum: [open_badges_v3, clr_v2]
        score:
          type: number
        preview:
          type: string
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          enum: [alive]
    ReadinessResponse:
      type: object
      required:
        - status
        - authoritative_store
        - search
      properties:
        status:
          type: string
          enum: [ready, degraded, unavailable]
        authoritative_store:
          type: string
          enum: [ready, unavailable]
        search:
          type: string
          enum: [ready, degraded, unavailable]
    ErrorResponse:
      type: object
      required:
        - error_code
        - message
        - timestamp
        - request_id
      properties:
        error_code:
          type: string
        message:
          type: string
        details:
          oneOf:
            - type: object
            - type: array
              items: {}
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
