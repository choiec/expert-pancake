services:
  surrealdb:
    image: surrealdb/surrealdb:v2.2.2
    command:
      - start
      - --log
      - info
      - --user
      - root
      - --pass
      - root
      - memory
    ports:
      - "8000:8000"

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_MASTER_KEY: local-dev-key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
