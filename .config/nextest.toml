[profile.default]
fail-fast = false
failure-output = "immediate-final"
retries = 0
slow-timeout = { period = "30s", terminate-after = 2 }
status-level = "pass"

[profile.ci]
fail-fast = false
failure-output = "final"
retries = 1
slow-timeout = { period = "60s", terminate-after = 2 }
status-level = "all"