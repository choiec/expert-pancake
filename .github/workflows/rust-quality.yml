name: rust-quality

on:
  pull_request:
  push:
    branches:
      - main
      - 001-memory-ingest
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Fast Tests
        run: cargo nextest run --workspace --lib --bins --tests --profile ci

  slow-gate:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov,cargo-mutants
      - name: Full Tests
        run: cargo nextest run --workspace --all-targets --all-features --profile ci
      - name: Coverage
        run: mkdir -p target/llvm-cov && cargo llvm-cov nextest --workspace --all-features --lcov --output-path target/llvm-cov/lcov.info
      - name: Mutants
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: cargo mutants --workspace --test-tool nextest